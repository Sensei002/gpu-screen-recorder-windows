name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg
          key: ffmpeg-shared-win64-gpl-${{ hashFiles('vcpkg.json') }}

      - name: Download FFmpeg pre-built binaries
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading FFmpeg from $url ..."
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_tmp" -Force
          $extracted = Get-ChildItem -Directory "ffmpeg_tmp" | Select-Object -First 1
          Move-Item "$($extracted.FullName)\*" "ffmpeg\" -Force
          Remove-Item "ffmpeg_tmp" -Recurse -Force
          Remove-Item "ffmpeg.zip" -Force
          Write-Host "FFmpeg ready at: $(Resolve-Path ffmpeg)"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -A x64 `
            -DFFMPEG_DIR="$($pwd.Path)\ffmpeg" `
            -DGSR_BUILD_CLI=ON `
            -DGSR_BUILD_UI=ON `
            -DGSR_BUILD_NOTIFICATION=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Copy FFmpeg DLLs to output
        shell: pwsh
        run: |
          # Find FFmpeg shared libraries (avcodec*.dll, avformat*.dll, etc.)
          $dlls = Get-ChildItem -Path "ffmpeg" -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue
          if ($dlls) {
            # Copy all DLLs from the directory where they're found
            Copy-Item $dlls.FullName "build\Release\" -Force
            Write-Host "Copied $($dlls.Count) FFmpeg DLLs to build/Release/"
          } else {
            Write-Host "Warning: No FFmpeg DLLs found. ffmpeg/ contents:"
            Get-ChildItem -Path "ffmpeg" -Recurse -Depth 2 -ErrorAction SilentlyContinue |
              Select-Object Mode, Name, Length | Format-Table -AutoSize
          }

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build CPack packages
        shell: cmd
        run: |
          cd build
          cpack -C Release

      - name: Stage packages for release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $nsisPkg = "gpu-screen-recorder-windows-$version-win64.exe"
          $zipPkg  = "gpu-screen-recorder-windows-$version-win64.zip"
          $pkgDir  = "${{ runner.temp }}\packages"

          New-Item -ItemType Directory -Path $pkgDir -Force

          Copy-Item "build\$nsisPkg" "$pkgDir\" -ErrorAction Stop
          Copy-Item "build\$zipPkg"  "$pkgDir\" -ErrorAction Stop

          Add-Content -Path $env:GITHUB_OUTPUT -Value "pkg-dir=$pkgDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "nsis=$nsisPkg"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip=$zipPkg"
        id: stage

      - name: Generate release notes
        shell: pwsh
        run: |
          $lastTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if (-not $lastTag) {
            $lastTag = git rev-list --max-parents=0 HEAD
          }

          $log = git log "$lastTag..HEAD" --pretty=format:"- %s" --no-merges

          @"
          ## gpu-screen-recorder-windows ${{ github.ref_name }}

          ### Changes since $lastTag
          $log
          "@ | Out-File -FilePath "${{ runner.temp }}\release-notes.md" -Encoding UTF8

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --notes-file "${{ runner.temp }}\release-notes.md" `
            "${{ steps.stage.outputs.pkg-dir }}\${{ steps.stage.outputs.nsis }}" `
            "${{ steps.stage.outputs.pkg-dir }}\${{ steps.stage.outputs.zip }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
