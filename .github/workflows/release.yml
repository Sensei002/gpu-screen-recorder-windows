name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download FFmpeg pre-built binaries
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading FFmpeg from $url ..."
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "." -Force
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-master-latest-win64-gpl*" | Select-Object -First 1
          $fullPath = Resolve-Path $ffmpegDir.FullName
          Write-Host "FFmpeg extracted to: $fullPath"
          echo "FFMPEG_DIR=$fullPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        run: |
          cmake -B build `
            -A x64 `
            -DFFMPEG_DIR="%FFMPEG_DIR%" `
            -DGSR_BUILD_CLI=ON `
            -DGSR_BUILD_UI=ON `
            -DGSR_BUILD_NOTIFICATION=ON
        shell: cmd

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build CPack packages
        shell: cmd
        run: |
          cd build
          cpack -C Release

      - name: Stage packages for release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $nsisPkg = "gpu-screen-recorder-windows-$version-win64.exe"
          $zipPkg  = "gpu-screen-recorder-windows-$version-win64.zip"
          $pkgDir  = "${{ runner.temp }}\packages"

          New-Item -ItemType Directory -Path $pkgDir -Force

          Copy-Item "build\$nsisPkg" "$pkgDir\" -ErrorAction Stop
          Copy-Item "build\$zipPkg"  "$pkgDir\" -ErrorAction Stop

          Add-Content -Path $env:GITHUB_OUTPUT -Value "pkg-dir=$pkgDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "nsis=$nsisPkg"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip=$zipPkg"
        id: stage

      - name: Generate release notes
        shell: pwsh
        run: |
          $lastTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if (-not $lastTag) {
            $lastTag = git rev-list --max-parents=0 HEAD
          }

          $log = git log "$lastTag..HEAD" --pretty=format:"- %s" --no-merges

          @"
          ## gpu-screen-recorder-windows ${{ github.ref_name }}

          ### Changes since $lastTag
          $log
          "@ | Out-File -FilePath "${{ runner.temp }}\release-notes.md" -Encoding UTF8

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --notes-file "${{ runner.temp }}\release-notes.md" `
            "${{ steps.stage.outputs.pkg-dir }}\${{ steps.stage.outputs.nsis }}" `
            "${{ steps.stage.outputs.pkg-dir }}\${{ steps.stage.outputs.zip }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
