name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup vcpkg (cached)
        uses: microsoft/vcpkg-action@v6
        id: vcpkg
        with:
          runInstall: true

      - name: Configure CMake
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.VCPKG_ROOT }}\scripts\buildsystems\vcpkg.cmake" `
            -DGSR_BUILD_CLI=ON `
            -DGSR_BUILD_UI=ON `
            -DGSR_BUILD_NOTIFICATION=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gpu-screen-recorder-windows-x64
          path: build/Release/
          if-no-files-found: warn
