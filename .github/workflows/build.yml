name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg
          key: ffmpeg-shared-win64-gpl-${{ hashFiles('vcpkg.json') }}

      - name: Download FFmpeg pre-built binaries
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading FFmpeg from $url ..."
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_tmp" -Force
          # Flatten: move contents up one level so ffmpeg/include, ffmpeg/lib, ffmpeg/bin
          $extracted = Get-ChildItem -Directory "ffmpeg_tmp" | Select-Object -First 1
          Move-Item "$($extracted.FullName)\*" "ffmpeg\" -Force
          Remove-Item "ffmpeg_tmp" -Recurse -Force
          Remove-Item "ffmpeg.zip" -Force
          Write-Host "FFmpeg ready at: $(Resolve-Path ffmpeg)"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -A x64 `
            -DFFMPEG_DIR="$($pwd.Path)\ffmpeg" `
            -DGSR_BUILD_CLI=ON `
            -DGSR_BUILD_UI=ON `
            -DGSR_BUILD_NOTIFICATION=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Copy FFmpeg DLLs to output
        shell: pwsh
        run: |
          # Find FFmpeg DLLs - BtbN shared builds put them in bin/,
          # but let's search flexibly in case the structure differs.
          Write-Host "Looking for FFmpeg DLLs..."
          Get-ChildItem -Path "ffmpeg" -Recurse -Filter "avcodec-*.dll" -ErrorAction SilentlyContinue |
            Select-Object -First 1 | ForEach-Object {
              $dllDir = $_.DirectoryName
              Write-Host "Found FFmpeg DLLs in: $dllDir"
              Copy-Item "$dllDir\*.dll" "build\Release\" -Force
              Write-Host "FFmpeg DLLs copied from $dllDir to build/Release/"
            }
          if (-not (Get-ChildItem -Path "ffmpeg" -Recurse -Filter "avcodec-*.dll" -ErrorAction SilentlyContinue)) {
            Write-Host "Warning: No FFmpeg DLLs found in ffmpeg/ directory. Listing contents:"
            Get-ChildItem -Path "ffmpeg" -Depth 1 -ErrorAction SilentlyContinue |
              Select-Object Name, Length | Format-Table -AutoSize
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpu-screen-recorder-windows-x64
          path: build/Release/
          if-no-files-found: warn
