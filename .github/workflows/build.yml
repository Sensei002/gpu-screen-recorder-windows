name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FFmpeg pre-built binaries
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading FFmpeg from $url ..."
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "." -Force
          # Find the extracted directory
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-master-latest-win64-gpl*" | Select-Object -First 1
          $fullPath = Resolve-Path $ffmpegDir.FullName
          Write-Host "FFmpeg extracted to: $fullPath"
          echo "FFMPEG_DIR=$fullPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        run: |
          cmake -B build `
            -A x64 `
            -DFFMPEG_DIR="%FFMPEG_DIR%" `
            -DGSR_BUILD_CLI=ON `
            -DGSR_BUILD_UI=ON `
            -DGSR_BUILD_NOTIFICATION=ON
        shell: cmd

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpu-screen-recorder-windows-x64
          path: build/Release/
          if-no-files-found: warn
