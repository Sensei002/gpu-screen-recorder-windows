name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg
          key: ffmpeg-shared-win64-gpl-${{ hashFiles('vcpkg.json') }}

      - name: Download FFmpeg pre-built binaries
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading FFmpeg from $url ..."
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_tmp" -Force
          # Flatten: move contents up one level so ffmpeg/include, ffmpeg/lib, ffmpeg/bin
          $extracted = Get-ChildItem -Directory "ffmpeg_tmp" | Select-Object -First 1
          Move-Item "$($extracted.FullName)\*" "ffmpeg\" -Force
          Remove-Item "ffmpeg_tmp" -Recurse -Force
          Remove-Item "ffmpeg.zip" -Force
          Write-Host "FFmpeg ready at: $(Resolve-Path ffmpeg)"

      - name: Configure CMake
        run: |
          cmake -B build `
            -A x64 `
            -DFFMPEG_DIR="%CD%\ffmpeg" `
            -DGSR_BUILD_CLI=ON `
            -DGSR_BUILD_UI=ON `
            -DGSR_BUILD_NOTIFICATION=ON
        shell: cmd

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Copy FFmpeg DLLs to output
        shell: pwsh
        run: |
          Copy-Item "ffmpeg\bin\*.dll" "build\Release\" -Force
          Write-Host "FFmpeg DLLs copied to build/Release/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpu-screen-recorder-windows-x64
          path: build/Release/
          if-no-files-found: warn
